  <text x="552" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#8892b0">Surfshark</text>
  <text x="552" y="308" font-family="system-ui, sans-serif" font-weight="800" font-size="42" fill="#2b7fff">90</text>
  <text x="607" y="308" font-family="system-ui, sans-serif" font-size="18" fill="#8892b0">/100</text>
  <text x="552" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">$2.19/mo · Unlimited</text>

  <!-- Card 4: Proton VPN -->
  <rect x="758" y="230" width="210" height="110" rx="12" fill="url(#cardgrad)" stroke="#2a2d3e" stroke-width="1"/>
  <text x="778" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#8892b0">Proton VPN</text>
  <text x="778" y="308" font-family="system-ui, sans-serif" font-weight="800" font-size="42" fill="#2b7fff">89</text>
  <text x="833" y="308" font-family="system-ui, sans-serif" font-size="18" fill="#8892b0">/100</text>
  <text x="778" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Privacy 98/100 · CH</text>


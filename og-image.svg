  <!-- Tagline -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#8892b0">Independent scoring · Public data · No paid placement</text>

  <!-- Score cards row -->
  <!-- Card 1: ExpressVPN -->
  <rect x="80" y="230" width="210" height="110" rx="12" fill="url(#cardgrad)" stroke="#2a2d3e" stroke-width="1"/>
  <path transform="translate(100,256.5) scale(0.55)" d="M13 2 L4.8 13.4 H10.4 L9.2 22 L19.2 10.2 H13.4 Z" fill="#da3940" stroke="#da3940" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="118" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#8892b0">ExpressVPN</text>
  <text x="100" y="308" font-family="system-ui, sans-serif" font-weight="800" font-size="42" fill="#00d26a">91</text>
  <text x="155" y="308" font-family="system-ui, sans-serif" font-size="18" fill="#8892b0">/100</text>
  <text x="100" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">932 Mbps · BVI</text>

  <!-- Card 2: NordVPN -->
  <rect x="306" y="230" width="210" height="110" rx="12" fill="url(#cardgrad)" stroke="#2a2d3e" stroke-width="1"/>
  <text x="326" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#8892b0">NordVPN</text>
  <text x="326" y="308" font-family="system-ui, sans-serif" font-weight="800" font-size="42" fill="#00d26a">91</text>
  <text x="381" y="308" font-family="system-ui, sans-serif" font-size="18" fill="#8892b0">/100</text>
  <text x="326" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">892 Mbps · Panama</text>


    <text x="133" y="390" text-anchor="middle" fill="#8892b0">Privacy</text>

    <rect x="198" y="370" width="92" height="30" rx="15" fill="#1a1d2b" stroke="#2a2d3e" stroke-width="1"/>
    <path transform="translate(212,377) scale(0.5)" d="M13 2 L4.8 13.4 H10.4 L9.2 22 L19.2 10.2 H13.4 Z" fill="#da3940" stroke="#da3940" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="251" y="390" text-anchor="middle" fill="#8892b0">Speed</text>

    <rect x="302" y="370" width="114" height="30" rx="15" fill="#1a1d2b" stroke="#2a2d3e" stroke-width="1"/>
    <text x="359" y="390" text-anchor="middle" fill="#8892b0">Streaming</text>

    <rect x="428" y="370" width="92" height="30" rx="15" fill="#1a1d2b" stroke="#2a2d3e" stroke-width="1"/>
    <text x="474" y="390" text-anchor="middle" fill="#8892b0">Value</text>

    <rect x="532" y="370" width="96" height="30" rx="15" fill="#1a1d2b" stroke="#2a2d3e" stroke-width="1"/>

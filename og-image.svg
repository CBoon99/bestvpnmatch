  <text x="80" y="603" font-family="system-ui, sans-serif" font-size="18" fill="#8892b0">bestvpnmatch.com</text>
  <text x="1120" y="603" font-family="system-ui, sans-serif" font-size="16" fill="#8892b0" text-anchor="end">15 VPNs · June 2026</text>

  <!-- Accent glow dot top right -->
  <circle cx="1100" cy="100" r="120" fill="#00d26a" opacity="0.04"/>
  <circle cx="1100" cy="100" r="60" fill="#00d26a" opacity="0.05"/>
</svg>
